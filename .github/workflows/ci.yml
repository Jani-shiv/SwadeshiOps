# ============================================
# SwadeshiOps — Continuous Integration
# Runs on every push and PR to main/develop
# ============================================
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.23"
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────
  # Go Backend — Lint, Test, Build
  # ─────────────────────────────────────────
  backend-lint:
    name: 🔍 Backend Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  backend-test:
    name: 🧪 Backend Test
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: swadeshiops
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: swadeshiops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://swadeshiops:testpassword@localhost:5432/swadeshiops_test?sslmode=disable
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-for-ci-pipeline
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        run: |
          go test ./... -v -race -coverprofile=coverage.out -covermode=atomic -timeout 300s

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: coverage.out
          retention-days: 7

  backend-build:
    name: 🔨 Backend Build
    runs-on: ubuntu-latest
    needs: backend-test
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.sha }}" \
            -o swadeshiops-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/server

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: swadeshiops-${{ matrix.goos }}-${{ matrix.goarch }}
          path: swadeshiops-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 7

  # ─────────────────────────────────────────
  # React Frontend — Lint, Type Check, Build
  # ─────────────────────────────────────────
  frontend-lint:
    name: 🎨 Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src/ --max-warnings=0

  frontend-typecheck:
    name: 📝 Frontend Type Check
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  frontend-build:
    name: 🏗️ Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-typecheck
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist
          retention-days: 7

  # ─────────────────────────────────────────
  # Security Scanning
  # ─────────────────────────────────────────
  security-scan:
    name: 🛡️ Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run Gosec security scanner
        uses: securego/gosec@master
        with:
          args: -fmt sarif -out gosec-results.sarif ./...
        continue-on-error: true

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec-results.sarif
        continue-on-error: true

      - name: Run Go vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || true

  # ─────────────────────────────────────────
  # CI Summary Gate
  # ─────────────────────────────────────────
  ci-pass:
    name: ✅ CI Pass
    runs-on: ubuntu-latest
    needs:
      - backend-build
      - frontend-build
      - security-scan
    if: always()
    steps:
      - name: Check CI results
        run: |
          echo "Backend Build: ${{ needs.backend-build.result }}"
          echo "Frontend Build: ${{ needs.frontend-build.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"

          if [[ "${{ needs.backend-build.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend-build.result }}" == "failure" ]]; then
            echo "❌ CI Failed"
            exit 1
          fi

          echo "✅ All CI checks passed!"
