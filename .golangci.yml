# ============================================
# golangci-lint configuration for SwadeshiOps
# ============================================
run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck       # Check unchecked errors
    - gosimple       # Simplification suggestions
    - govet          # Go vet checks
    - ineffassign    # Detect ineffectual assignments
    - staticcheck    # Advanced static analysis
    - typecheck      # Type checking
    - unused         # Unused code detection
    - gofmt          # Format checking
    - goimports      # Import ordering
    - misspell       # Spell checking
    - bodyclose      # HTTP body close checking
    - gosec          # Security checks
    - prealloc       # Slice preallocation

linters-settings:
  errcheck:
    check-type-assertions: true
  gosec:
    severity: medium
    confidence: medium
  misspell:
    locale: US

issues:
  exclude-rules:
    # Allow unused parameters in handler functions
    - path: handler\.go
      linters:
        - unused
    # Allow unchecked errors in test files
    - path: _test\.go
      linters:
        - errcheck
        - gosec
    # Allow unused in main
    - path: main\.go
      linters:
        - unused
  max-issues-per-linter: 50
  max-same-issues: 3
